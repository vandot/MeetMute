name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

      - name: Create zip
        run: ditto -c -k --keepParent MeetMute.app MeetMute.app.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: MeetMute.app.zip
          generate_release_notes: true
